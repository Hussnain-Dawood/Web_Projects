<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vogue Vista - Women’s Collection</title>

  <!-- Global styles (reset, header, footer, utilities) -->
  <link rel="stylesheet" href="css/styles.css" />

  <!-- Page-specific styles (Women’s Collection only) -->
  <style>
    /* ========== HERO SECTION (WOMEN) ========== */
    .hero {
      background: url('https://images.unsplash.com/photo-1508385082359-fdca9d5ff2c6?auto=format&fit=crop&w=1350&q=80')
        center/cover no-repeat;
      height: 350px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: #ffffff;
      position: relative;
      margin-bottom: 30px;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background-color: rgba(0, 0, 0, 0.4);
      z-index: 0;
    }

    .hero-content {
      position: relative;
      z-index: 1;
      max-width: 700px;
    }

    .hero-content h1 {
      font-family: 'Playfair Display', serif;
      font-size: 3rem;
      margin-bottom: 0.5rem;
    }

    .hero-content p {
      font-size: 1.25rem;
    }

    /* ========== CATEGORY FILTER BAR ========== */
    .category-bar {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
      margin-bottom: 25px;
      font-family: 'Lato', sans-serif;
      font-weight: 700;
      text-transform: uppercase;
    }

    .category-bar button {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 0.9rem;
      color: #000000;
      padding-bottom: 5px;
      position: relative;
      transition: color 0.3s ease;
    }

    .category-bar button:hover,
    .category-bar button.active {
      color: #d4af37;
    }

    .category-bar button.active::after {
      content: "";
      position: absolute;
      bottom: 0;
      left: 0;
      height: 3px;
      width: 100%;
      background-color: #d4af37;
      border-radius: 2px;
    }

    /* ========== FILTER & SORT BAR ========== */
    .filter-sort-bar {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      max-width: 1200px;
      margin: 0 auto 30px auto;
      padding: 0 20px;
      font-family: 'Open Sans', sans-serif;
      gap: 10px;
    }

    .filter-sort-bar select {
      padding: 8px 12px;
      font-size: 1rem;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      background-color: #f9f9f9;
      cursor: pointer;
    }

    /* ========== PRODUCT GRID ========== */
    .product-grid {
      display: grid;
      gap: 30px;
      max-width: 1200px;
      margin: 0 auto 50px auto;
      grid-template-columns: repeat(3, 1fr);
      padding: 0 20px;
    }

    @media (max-width: 992px) {
      .product-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 600px) {
      .product-grid {
        grid-template-columns: 1fr;
      }
    }

    .product-card {
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      overflow: hidden;
      position: relative;
      background-color: #fff;
      transition: box-shadow 0.3s ease;
    }

    .product-card:hover {
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
    }

    /* link wrapping image + info */
    .product-link {
      display: block;
      text-decoration: none;
      color: inherit;
    }

    .product-image {
      width: 100%;
      height: 300px;
      object-fit: cover;
      display: block;
      transition: transform 0.3s ease;
    }

    .product-card:hover .product-image {
      transform: scale(1.05);
    }

    /* Add to Cart button */
    .add-to-cart-btn {
      position: absolute;
      bottom: 15px;
      left: 50%;
      transform: translateX(-50%);
      background-color: #d4af37;
      color: #fff;
      padding: 10px 25px;
      border-radius: 25px;
      font-family: 'Lato', sans-serif;
      font-weight: 700;
      text-transform: uppercase;
      font-size: 0.9rem;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease;
      cursor: pointer;
      border: none;
    }

    .product-card:hover .add-to-cart-btn {
      opacity: 1;
      visibility: visible;
    }

    /* Wishlist icon */
    .wishlist-icon {
      position: absolute;
      top: 15px;
      right: 15px;
      font-size: 1.5rem;
      color: #fff;
      cursor: pointer;
      transition: color 0.3s ease;
      text-shadow: 0 0 6px rgba(0, 0, 0, 0.6);
      user-select: none;
      background: none;
      border: none;
    }

    .wishlist-icon:hover {
      color: #d4af37;
    }

    /* Badge */
    .badge {
      position: absolute;
      top: 15px;
      left: 15px;
      background: #d4af37;
      color: #fff;
      font-family: 'Lato', sans-serif;
      font-weight: 700;
      font-size: 0.75rem;
      padding: 5px 8px;
      border-radius: 20px;
      text-transform: uppercase;
      user-select: none;
    }

    /* Product info */
    .product-info {
      padding: 15px;
      text-align: center;
    }

    .product-name {
      font-size: 1rem;
      margin-bottom: 8px;
      color: #000;
    }

    .product-price {
      font-family: 'Lato', sans-serif;
      font-weight: 700;
      color: #d4af37;
      font-size: 1rem;
    }

    /* ========== PAGINATION ========== */
    .pagination {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 50px;
    }

    .pagination button {
      background-color: #f9f9f9;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      padding: 8px 14px;
      font-family: 'Lato', sans-serif;
      font-weight: 700;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    .pagination button:hover,
    .pagination .active {
      background-color: #d4af37;
      color: white;
      border-color: #d4af37;
    }

    /* ========== RESPONSIVE (WOMEN PAGE ONLY) ========== */
    @media (max-width: 768px) {
      .hero {
        height: 280px;
      }

      .hero-content h1 {
        font-size: 2.2rem;
      }

      .hero-content p {
        font-size: 1rem;
      }
    }
  </style>

  <link
    href="https://fonts.googleapis.com/css2?family=Lato:wght@700&family=Open+Sans&family=Playfair+Display&display=swap"
    rel="stylesheet"
  />
</head>
<body class="page-women">

  <!-- Header placeholder (loaded via layout.js from header.html) -->
  <div id="site-header"></div>

  <!-- Page Hero -->
  <section class="hero" role="banner">
    <div class="hero-content">
      <h1>Women’s Collection</h1>
      <p>Discover the latest trends and timeless pieces for women.</p>
    </div>
  </section>

  <!-- Category Filter Bar -->
  <nav class="category-bar" aria-label="Women's Collection Categories">
    <button class="active" type="button">All</button>
    <button type="button">Dresses</button>
    <button type="button">Tops</button>
    <button type="button">Bottoms</button>
    <button type="button">Accessories</button>
    <button type="button">Shoes</button>
    <button type="button">Sale</button>
  </nav>

  <!-- Filter and Sort Controls -->
  <div class="filter-sort-bar" role="region" aria-label="Filter and sort products">
    <select aria-label="Filter by Size">
      <option value="">Size</option>
      <option value="xs">XS</option>
      <option value="s">S</option>
      <option value="m">M</option>
      <option value="l">L</option>
      <option value="xl">XL</option>
    </select>

    <select aria-label="Filter by Color">
      <option value="">Color</option>
      <option value="black">Black</option>
      <option value="white">White</option>
      <option value="red">Red</option>
      <option value="blue">Blue</option>
    </select>

    <select aria-label="Filter by Price Range">
      <option value="">Price Range</option>
      <option value="0-50">$0 - $50</option>
      <option value="51-100">$51 - $100</option>
      <option value="101-200">$101 - $200</option>
    </select>

    <select aria-label="Sort products by">
      <option value="newest">Newest</option>
      <option value="lowhigh">Price Low to High</option>
      <option value="highlow">Price High to Low</option>
      <option value="popular">Most Popular</option>
    </select>
  </div>

  <!-- Products Grid -->
  <section class="product-grid" aria-label="Women's products">
    <article class="product-card">
      <span class="badge">New</span>
      <button class="wishlist-icon" aria-label="Add product to wishlist">&#10084;</button>

      <a href="product.html" class="product-link">
        <img
          src="pics/red dress.jpg"
          alt="Elegant Red Dress"
          class="product-image"
        />
        <div class="product-info">
          <h3 class="product-name">Elegant Red Dress</h3>
          <p class="product-price">$120.00</p>
        </div>
      </a>

      <button class="add-to-cart-btn" aria-label="Add Elegant Red Dress to cart">Add to Cart</button>
    </article>

    <article class="product-card">
      <span class="badge">Trending</span>
      <button class="wishlist-icon" aria-label="Add product to wishlist">&#10084;</button>

      <a href="product.html" class="product-link">
        <img
          src="pics/top.jpg"
          alt="Soft Casual Top"
          class="product-image"
        />
        <div class="product-info">
          <h3 class="product-name">Soft Casual Top</h3>
          <p class="product-price">$55.00</p>
        </div>
      </a>

      <button class="add-to-cart-btn" aria-label="Add Soft Casual Top to cart">Add to Cart</button>
    </article>

    <article class="product-card">
      <button class="wishlist-icon" aria-label="Add product to wishlist">&#10084;</button>

      <a href="product.html" class="product-link">
        <img
          src="pics/heels.jpg"
          alt="Classic Black Heels"
          class="product-image"
        />
        <div class="product-info">
          <h3 class="product-name">Classic Black Heels</h3>
          <p class="product-price">$89.00</p>
        </div>
      </a>

      <button class="add-to-cart-btn" aria-label="Add Classic Black Heels to cart">Add to Cart</button>
    </article>

    <!-- Add more product cards as needed -->
  </section>

  <!-- Pagination -->
  <nav class="pagination" role="navigation" aria-label="Pagination">
    <button aria-label="Page 1" class="active">1</button>
    <button aria-label="Page 2">2</button>
    <button aria-label="Page 3">3</button>
    <button aria-label="Next Page">&raquo;</button>
  </nav>

  <!-- Footer placeholder (loaded via layout.js from footer.html) -->
  <div id="site-footer"></div>

  <!-- Common layout loader -->
  <script src="layout.js"></script>
</body>
</html>
